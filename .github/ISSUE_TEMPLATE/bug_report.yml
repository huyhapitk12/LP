name: 🐛 Bug Report
description: Report a bug in LP compiler or runtime
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: "The LP compiler crashes when..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Create file 'test.lp' with content:
        ```lp
        def main():
            print("hello")
        ```
        2. Run `lp test.lp`
        3. Observe the error
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Code Sample
      description: Minimal reproducible code
      placeholder: |
        ```lp
        def main():
            print("hello")
        
        main()
        ```
      render: lp
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: "The program should compile and print 'hello'"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: "The compiler produced an error..."
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error Output
      description: If applicable, paste the error message
      placeholder: |
        ```
        Error: ... at line 1, column 1
        ```
      render: shell

  - type: input
    id: version
    attributes:
      label: LP Version
      description: What version of LP are you using?
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux (Ubuntu/Debian)
        - Linux (Other)
        - Windows (MSYS2/MinGW)
        - macOS (Intel)
        - macOS (Apple Silicon)
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here
