name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-smoke:
    name: Host build and smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-24.04, macos-15]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 Toolchain (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: UCRT64
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-make

      - name: Add MSYS2 GCC to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "C:\msys64\ucrt64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Build Essentials (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build with build.bat (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: build.bat

      - name: Build with Makefile (Linux/macOS)
        if: runner.os != 'Windows'
        run: make

      - name: Build with compile.sh (Linux/macOS)
        if: runner.os != 'Windows'
        run: bash ./compile.sh

      - name: Smoke Run (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Content -Path ci_smoke.lp -Value "print(42)" -NoNewline
          cmd /c build\lp.exe ci_smoke.lp -c ci_smoke.exe
          cmd /c ci_smoke.exe > smoke_out.txt
          Select-String -Path smoke_out.txt -Pattern '^42$' | Out-Null

      - name: Smoke Run (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          printf "print(42)\n" > ci_smoke.lp
          ./build/lp ci_smoke.lp -c ci_smoke
          ./ci_smoke > smoke_out.txt
          grep -q '^42$' smoke_out.txt

      - name: Regression Tests (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: build\lp.exe test examples

      - name: Regression Tests (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./build/lp test examples

  cross-target-verify:
    name: Cross-target verify (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: windows-x64
            artifact: ci-cross-windows-x64.exe
            expected_pattern: 'PE32\+ executable .* x86-64'
          - os: ubuntu-24.04
            target: linux-x64
            artifact: ci-cross-linux-x64
            expected_pattern: 'ELF 64-bit .* x86-64'
          - os: ubuntu-24.04
            target: linux-arm64
            artifact: ci-cross-linux-arm64
            expected_pattern: 'ELF 64-bit .* ARM aarch64'
          - os: macos-15
            target: macos-arm64
            artifact: ci-cross-macos-arm64
            expected_pattern: 'Mach-O 64-bit executable arm64'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Cross Toolchains (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-x86-64-linux-gnu \
            gcc-aarch64-linux-gnu \
            gcc-mingw-w64-x86-64 \
            file

      - name: Install macOS target shim
        if: runner.os == 'macOS'
        run: |
          mkdir -p "$RUNNER_TEMP/toolchain-bin"
          cat > "$RUNNER_TEMP/toolchain-bin/aarch64-apple-darwin-gcc" <<'EOF'
          #!/usr/bin/env bash
          exec clang -arch arm64 "$@"
          EOF
          chmod +x "$RUNNER_TEMP/toolchain-bin/aarch64-apple-darwin-gcc"
          echo "$RUNNER_TEMP/toolchain-bin" >> "$GITHUB_PATH"

      - name: Build host compiler
        run: make

      - name: Verify cross-target build output
        shell: bash
        run: |
          cat > ci_cross.lp <<'EOF'
          print(42)
          EOF

          ./build/lp build ci_cross.lp --target "${{ matrix.target }}" -o "${{ matrix.artifact }}"
          test -f "${{ matrix.artifact }}"

          file "${{ matrix.artifact }}" | tee ci_cross_file.txt
          grep -E "${{ matrix.expected_pattern }}" ci_cross_file.txt
