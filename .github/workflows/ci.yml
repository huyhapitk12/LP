name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-smoke:
    name: Host build and smoke (ubuntu-24.04)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Essentials
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build with Makefile
        run: make

      - name: Build with compile.sh
        run: bash ./compile.sh

      - name: Smoke Run
        run: |
          printf "print(42)\n" > ci_smoke.lp
          ./build/lp ci_smoke.lp -c ci_smoke
          ./ci_smoke > smoke_out.txt
          grep -q '^42$' smoke_out.txt

      - name: Regression Tests
        run: ./build/lp test examples

  cross-target-verify:
    name: Cross-target verify (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: windows-x64
            artifact: ci-cross-windows-x64.exe
            expected_pattern: 'PE32\+ executable .* x86-64'
          - os: ubuntu-24.04
            target: linux-x64
            artifact: ci-cross-linux-x64
            expected_pattern: 'ELF 64-bit .* x86-64'
          - os: ubuntu-24.04
            target: linux-arm64
            artifact: ci-cross-linux-arm64
            expected_pattern: 'ELF 64-bit .* ARM aarch64'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Cross Toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-x86-64-linux-gnu \
            gcc-aarch64-linux-gnu \
            gcc-mingw-w64-x86-64 \
            file

      - name: Build host compiler
        run: make

      - name: Verify cross-target build output
        shell: bash
        run: |
          cat > ci_cross.lp <<'EOF'
          print(42)
          EOF

          ./build/lp build ci_cross.lp --target "${{ matrix.target }}" -o "${{ matrix.artifact }}"
          test -f "${{ matrix.artifact }}"

          file "${{ matrix.artifact }}" | tee ci_cross_file.txt
          grep -E "${{ matrix.expected_pattern }}" ci_cross_file.txt
